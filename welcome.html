<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Edo Apartment — Welcome Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F3EE;
    --warm-white: #FDFAF6;
    --sand: #E8DDD0;
    --terracotta: #C4724A;
    --gold: #D4A95A;
    --dark: #1C1814;
    --muted: #7A6E65;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  header {
    padding: 1.25rem 2rem;
    background: var(--warm-white);
    border-bottom: 1px solid var(--sand);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-weight: 400;
    color: var(--dark);
  }

  .header-sub {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .quick-topics {
    padding: 1rem 2rem;
    background: var(--warm-white);
    border-bottom: 1px solid var(--sand);
    flex-shrink: 0;
    overflow-x: auto;
    white-space: nowrap;
    scrollbar-width: none;
  }
  .quick-topics::-webkit-scrollbar { display: none; }

  .topic-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 0.75rem;
    vertical-align: middle;
  }

  .topic-btn {
    display: inline-block;
    padding: 0.4rem 1rem;
    border: 1px solid var(--sand);
    background: var(--cream);
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 300;
    cursor: pointer;
    transition: all 0.2s;
    margin-right: 0.5rem;
    vertical-align: middle;
    white-space: nowrap;
  }
  .topic-btn:hover {
    background: var(--terracotta);
    border-color: var(--terracotta);
    color: white;
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .msg {
    max-width: 680px;
    animation: fadeUp 0.3s ease;
  }

  .msg.assistant { align-self: flex-start; }
  .msg.user { align-self: flex-end; }

  .msg-bubble {
    padding: 1rem 1.25rem;
    line-height: 1.75;
    font-size: 0.9rem;
  }

  .msg.assistant .msg-bubble {
    background: var(--warm-white);
    border: 1px solid var(--sand);
    border-left: 3px solid var(--terracotta);
    color: var(--dark);
  }

  .msg.user .msg-bubble {
    background: var(--terracotta);
    color: white;
  }

  .msg-sender {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
    padding-left: 0.25rem;
  }

  .msg.user .msg-sender {
    text-align: right;
    padding-right: 0.25rem;
  }

  .typing {
    display: flex;
    gap: 4px;
    padding: 1rem 1.25rem;
    background: var(--warm-white);
    border: 1px solid var(--sand);
    border-left: 3px solid var(--terracotta);
    width: fit-content;
  }

  .typing span {
    width: 6px;
    height: 6px;
    background: var(--terracotta);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  .input-area {
    padding: 1.25rem 2rem;
    background: var(--warm-white);
    border-top: 1px solid var(--sand);
    display: flex;
    gap: 0.75rem;
    flex-shrink: 0;
  }

  .chat-input {
    flex: 1;
    padding: 0.875rem 1.25rem;
    background: var(--cream);
    border: 1px solid var(--sand);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s;
    border-radius: 0;
  }
  .chat-input:focus { border-color: var(--terracotta); }
  .chat-input::placeholder { color: var(--muted); }

  .send-btn {
    padding: 0.875rem 1.5rem;
    background: var(--terracotta);
    color: white;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #B3613B; }
  .send-btn:disabled { background: var(--muted); cursor: not-allowed; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .chat-area { padding: 1rem; }
    .input-area { padding: 1rem; }
    header { padding: 1rem; }
    .quick-topics { padding: 0.75rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-logo">The Edo Apartment</div>
  </div>
  <div class="header-sub">Welcome Guide</div>
</header>

<div class="quick-topics">
  <span class="topic-label">Rýchle témy:</span>
  <button class="topic-btn" onclick="quickAsk('Ako sa dostanem do bytu? Príchod, kódy, kľúče.')">🔑 Príchod &amp; zámok</button>
  <button class="topic-btn" onclick="quickAsk('Ako funguje parkovanie a garáž?')">🚗 Parkovanie</button>
  <button class="topic-btn" onclick="quickAsk('Aké je wifi heslo?')">📶 Wifi</button>
  <button class="topic-btn" onclick="quickAsk('Ako funguje klimatizácia?')">❄️ Klimatizácia</button>
  <button class="topic-btn" onclick="quickAsk('Ako funguje markíza na terase?')">☂️ Markíza</button>
  <button class="topic-btn" onclick="quickAsk('Kde sú uteráky a posteľné prádlo?')">🛏 Posteľné prádlo</button>
  <button class="topic-btn" onclick="quickAsk('Kde sa vyhadzuje odpad a ako separovať?')">♻️ Odpad</button>
  <button class="topic-btn" onclick="quickAsk('Ako funguje bazén? Kedy môžem ísť?')">🏊 Bazén</button>
  <button class="topic-btn" onclick="quickAsk('Čo treba urobiť pri odchode z bytu?')">🚪 Odchod</button>
  <button class="topic-btn" onclick="quickAsk('Ako kontaktujem majiteľov v núdzovej situácii?')">📞 Kontakt</button>
  <button class="topic-btn" onclick="quickAsk('Čo odporúčaš v okolí? Reštaurácie, zmrzlina, hrádza.')">🍽 Tipy v okolí</button>
  <button class="topic-btn" onclick="quickAsk('Ako sa dostanem do Piešťan autobusov alebo taxíkom?')">🚌 Doprava</button>
  <button class="topic-btn" onclick="quickAsk('Čo sa nachádza v kuchyni? Spotrebiče a vybavenie.')">🍳 Kuchyňa</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="msg assistant">
    <div class="msg-sender">Edo</div>
    <div class="msg-bubble">
      Vitajte v The Edo Apartment! 🐾<br><br>
      Som tu, aby som ti pomohol zorientovať sa v byte. Opýtaj sa ma na čokoľvek — parkovanie, wifi, spotrebiče, bazén, odchod... Odpovedám v jazyku, v ktorom píšeš.
    </div>
  </div>
</div>

<div class="input-area">
  <input
    type="text"
    class="chat-input"
    id="chatInput"
    placeholder="Napíšte otázku... (napr. 'kde je wifi heslo')"
    onkeydown="if(event.key==='Enter') sendMessage()"
  >
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">Odoslať</button>
</div>

<script>
// ============================================================
// Chatbot volá BEZPEČNÚ PROXY (Google Apps Script) cez JSONP.
// JSONP obchádza CORS. Žiadny API kľúč tu NIE JE.
// Ak meníš proxy, zmeň len túto jednu adresu:
// ============================================================
const PROXY_URL = 'https://script.google.com/macros/s/AKfycbwA4ak9yWJ75Lngx6zjC2KIGtFWP9A3OnTG29W68M3yEBfKkHGYuOr2sTGL_gxkR5RW4A/exec';

const conversation = [];
let jsonpCounter = 0;

// JSONP volanie: vloží <script> tag s callbackom, tým sa vyhne CORS
function callProxy(messages) {
  return new Promise((resolve, reject) => {
    jsonpCounter++;
    const cbName = 'edoCb_' + jsonpCounter;
    const script = document.createElement('script');
    let done = false;

    const timeout = setTimeout(() => {
      if (!done) {
        cleanup();
        reject(new Error('timeout'));
      }
    }, 30000);

    function cleanup() {
      done = true;
      clearTimeout(timeout);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = function(data) {
      cleanup();
      resolve(data);
    };

    script.onerror = function() {
      if (!done) { cleanup(); reject(new Error('script_error')); }
    };

    const params = 'callback=' + encodeURIComponent(cbName)
      + '&messages=' + encodeURIComponent(JSON.stringify(messages));
    script.src = PROXY_URL + '?' + params;
    document.body.appendChild(script);
  });
}

async function sendMessage(userText) {
  const input = document.getElementById('chatInput');
  const text = userText || input.value.trim();
  if (!text) return;

  input.value = '';
  addMessage('user', text);
  conversation.push({ role: 'user', content: text });

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  const typingEl = addTyping();

  try {
    const data = await callProxy(conversation);
    if (data.type === 'error') {
      console.error('Proxy/Anthropic error:', data.error);
    }
    const reply = (data.content && data.content[0] && data.content[0].text)
      ? data.content[0].text
      : 'Prepáč, nastala chyba. Skús to znova — a ak to nepomôže, napíš majiteľovi.';

    typingEl.remove();
    addMessage('assistant', reply);
    conversation.push({ role: 'assistant', content: reply });
  } catch(e) {
    typingEl.remove();
    addMessage('assistant', 'Nastala technická chyba. Skús znova alebo napíš majiteľovi.');
    console.error(e);
  }

  btn.disabled = false;
  input.focus();
}

function quickAsk(text) {
  sendMessage(text);
}

function addMessage(role, text) {
  const chatArea = document.getElementById('chatArea');
  const msg = document.createElement('div');
  msg.className = 'msg ' + role;

  const sender = document.createElement('div');
  sender.className = 'msg-sender';
  sender.textContent = role === 'assistant' ? 'Edo' : 'Vy';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  let formatted = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  bubble.innerHTML = formatted;

  msg.appendChild(sender);
  msg.appendChild(bubble);
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
  return msg;
}

function addTyping() {
  const chatArea = document.getElementById('chatArea');
  const msg = document.createElement('div');
  msg.className = 'msg assistant';

  const sender = document.createElement('div');
  sender.className = 'msg-sender';
  sender.textContent = 'Edo';

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';

  msg.appendChild(sender);
  msg.appendChild(typing);
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
  return msg;
}

document.getElementById('chatInput').focus();
</script>
</body>
</html>
